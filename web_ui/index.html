<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eter OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="desktop">
        <!-- Desktop Icons -->
        <div class="icon" onclick="openWindow('calculator')" tabindex="0" role="button" data-tooltip="Open Calculator">
            <img src="icons/calculator.png" alt="" aria-hidden="true">
            <span>Calculator</span>
        </div>
        <div class="icon" onclick="openWindow('notepad')" tabindex="0" role="button" data-tooltip="Open Notepad">
            <img src="icons/notepad.png" alt="" aria-hidden="true">
            <span>Notepad</span>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <button id="start-btn" data-tooltip="System Menu">Start</button>
        <div id="clock">12:00 PM</div>
    </div>

    <!-- Windows will be injected here -->
    <div id="windows-container"></div>

    <script src="app.js"></script>
</body>
</html>
